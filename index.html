<!DOCTYPE html>
<html>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px; transition: background 0.3s;">
    <div style="background: white; display: inline-block; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h3>🎨 颜色转换 & 预览</h3>
        <input id="hex" placeholder="#FFFFFF" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <button onclick="convert()" style="padding: 8px 15px; cursor: pointer;">转换</button>
        <p id="rgb" style="font-weight: bold; margin-top: 15px; color: #555;"></p>
    </div>

    <script>
        function convert() {
            let hex = document.getElementById('hex').value.trim();
            // 自动补齐 # 号
            if (hex[0] !== '#') hex = '#' + hex;
            
            // 处理简写格式如 #fff -> #ffffff
            if (hex.length === 4) {
                hex = '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
            }

            if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
                let r = parseInt(hex.slice(1,3), 16);
                let g = parseInt(hex.slice(3,5), 16);
                let b = parseInt(hex.slice(5,7), 16);
                const rgbResult = `rgb(${r}, ${g}, ${b})`;
                
                document.getElementById('rgb').innerText = rgbResult;
                // 同步改变网页背景颜色，直观看到效果
                document.body.style.backgroundColor = hex;
            } else {
                document.getElementById('rgb').innerText = "请输入正确的 Hex 格式";
            }
        }
    </script>
</body>
</html>
